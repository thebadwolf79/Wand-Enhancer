name: Auto sync and build

on:
  schedule:
    - cron: '0 12 * * *'  # daily at noon UTC; releases are infrequent, 6h was excessive
  workflow_dispatch:
    inputs:
      force:
        description: 'Build & publish a release even if no new upstream version'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for merge-upstream API call
    outputs:
      new_release: ${{ steps.compare.outputs.new_release }}
      version: ${{ steps.compare.outputs.version }}

    steps:
      - name: Get upstream latest release tag
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/k1tbyte/Wand-Enhancer/releases/latest --jq '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Upstream: $TAG"

      # Uses the LAST_BUILT_VERSION repo variable (set by the build job on success).
      # Reading via vars context requires no permissions; no gh api call needed.
      # On first run the variable is empty, so any upstream release will trigger a build.
      - name: Compare against last built version
        id: compare
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
          LAST: ${{ vars.LAST_BUILT_VERSION }}
          FORCE: ${{ inputs.force }}
        run: |
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Last built: ${LAST:-<none>} | Upstream: $TAG | Force: ${FORCE:-false}"
          if [ "$FORCE" = "true" ]; then
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "Force build requested — building $TAG regardless of last built version."
          elif [ "$TAG" = "$LAST" ]; then
            echo "new_release=false" >> $GITHUB_OUTPUT
            echo "Already built $TAG — nothing to do."
          else
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "New release $TAG detected."
          fi

      - name: Sync fork master with upstream
        if: steps.compare.outputs.new_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Syncing fork master with upstream..."
          gh api "repos/${{ github.repository }}/merge-upstream" \
            -X POST -f branch=master
          echo "Sync complete."

  build:
    needs: check
    if: needs.check.outputs.new_release == 'true'
    # Keep windows-latest — build.ps1 explicitly auto-detects VS version ("pick whatever VS the host has")
    runs-on: windows-latest
    permissions:
      contents: write  # required to publish the GitHub release (and tag)
      actions: write   # required to update LAST_BUILT_VERSION variable on success

    steps:
      # Pin to master so we build the freshly-synced upstream code, not the
      # (stale) SHA that triggered the scheduled run.
      - uses: actions/checkout@v5  # v5 uses Node.js 24; v4 triggers Node.js 20 deprecation warning
        with:
          ref: master
          fetch-depth: 0  # full history so the release tag resolves cleanly

      - uses: pnpm/action-setup@v4
        with:
          version: 10  # must match the version used to generate web-panel/pnpm-lock.yaml

      - uses: actions/setup-node@v5  # v5 uses Node.js 24
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-panel/pnpm-lock.yaml

      - name: Build
        shell: pwsh
        run: ./build.ps1 -Configuration Release

      - uses: actions/upload-artifact@v4
        with:
          name: WandEnhancer-${{ needs.check.outputs.version }}
          path: WandEnhancer/bin/Release/WandEnhancer.exe
          if-no-files-found: error
          retention-days: 90

      # Pull release notes from the changelog if a matching section exists;
      # otherwise fall back to a generic note so the release always publishes.
      - name: Generate release notes
        if: success()
        shell: pwsh
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          try {
            ./scripts/get-changelog-section.ps1 -Version $env:VERSION -OutputPath release-notes.md
          } catch {
            Write-Host "Changelog lookup failed ($($_.Exception.Message)); using fallback notes."
          }
          if (-not (Test-Path release-notes.md) -or -not (Get-Content release-notes.md -Raw).Trim()) {
            "Automated build of upstream Wand-Enhancer release **$env:VERSION**." | Out-File release-notes.md -Encoding utf8
          }

      - name: Publish GitHub release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.version }}
          name: ${{ needs.check.outputs.version }}
          target_commitish: master  # tag the synced commit, not the stale trigger SHA
          body_path: release-notes.md
          files: WandEnhancer/bin/Release/WandEnhancer.exe
          fail_on_unmatched_files: true

      # Only runs if all prior steps succeeded. Creates/updates the LAST_BUILT_VERSION
      # repo variable so the next scheduled check skips the build correctly.
      # PATCH fails with 404 if variable doesn't exist yet; fall back to POST.
      - name: Mark version as built
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $VERSION = "${{ needs.check.outputs.version }}"
          $null = gh api "repos/${{ github.repository }}/actions/variables/LAST_BUILT_VERSION" `
            -X PATCH -f "value=$VERSION" 2>&1
          if ($LASTEXITCODE -ne 0) {
            gh api "repos/${{ github.repository }}/actions/variables" `
              -X POST -f "name=LAST_BUILT_VERSION" -f "value=$VERSION"
          }
          Write-Host "Marked $VERSION as built."
