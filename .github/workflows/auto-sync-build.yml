# Template: add this file to your Wand-Enhancer fork at
#   .github/workflows/auto-sync-build.yml
#
# What it does:
#   Every 6 hours, checks if k1tbyte/Wand-Enhancer has a release tag that
#   isn't on your fork yet. If so, syncs master and builds the exe automatically.
#   The artifact is named WandEnhancer-<version> and kept for 90 days.

name: Auto sync and build

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release: ${{ steps.compare.outputs.new_release }}
      version: ${{ steps.compare.outputs.version }}

    steps:
      - name: Get upstream latest release tag
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/k1tbyte/Wand-Enhancer/releases/latest --jq '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Upstream tag: $TAG"

      - name: Check if fork already has this tag
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          if gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" > /dev/null 2>&1; then
            echo "new_release=false" >> $GITHUB_OUTPUT
            echo "Already at $TAG — nothing to do."
          else
            echo "new_release=true" >> $GITHUB_OUTPUT
            echo "New release $TAG not on fork yet — syncing."
          fi

      - name: Sync fork master with upstream
        if: steps.compare.outputs.new_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/merge-upstream" \
            -X POST \
            -f branch=master

  build:
    needs: check
    if: needs.check.outputs.new_release == 'true'
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-panel/pnpm-lock.yaml

      - name: Build
        shell: pwsh
        run: ./build.ps1 -Configuration Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WandEnhancer-${{ needs.check.outputs.version }}
          path: WandEnhancer/bin/Release/WandEnhancer.exe
          if-no-files-found: error
          retention-days: 90
